<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel ⇄ JSON Converter</title>
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100dvh;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 16px;
}

.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.25);
  padding: clamp(16px, 4vw, 32px);
  max-width: 720px;
  width: 100%;
  margin-top: clamp(20px, 8vh, 80px);
}

h1 {
  margin: 0 0 6px;
  font-size: clamp(18px, 4vw, 24px);
  color: #333;
}

p.sub {
  margin: 0 0 24px;
  color: #777;
  font-size: clamp(12px, 2.5vw, 14px);
}

.section {
  border: 2px dashed #ddd;
  border-radius: 12px;
  padding: clamp(12px, 3vw, 20px);
  margin-bottom: 20px;
  transition: border-color 0.2s;
}

.section:hover { border-color: #9a8cf0; }

.section h2 {
  margin: 0 0 12px;
  font-size: clamp(14px, 3vw, 16px);
  color: #444;
}

input[type="file"] {
  display: block;
  width: 100%;
  margin-bottom: 12px;
  font-size: 13px;
}

button {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  width: 100%;
  transition: transform 0.15s, opacity 0.15s;
}

button:hover { transform: translateY(-2px); opacity: 0.92; }
button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

canvas {
  max-width: 100%;
  height: auto;
  border-radius: 8px;
  margin-top: 12px;
  border: 1px solid #eee;
  display: none;
}

.status {
  font-size: 12px;
  color: #667eea;
  margin-top: 8px;
  min-height: 18px;
  word-break: break-word;
}

@media (min-width: 480px) {
  button { width: auto; }
}
</style>
</head>
<body>
<div class="card">
  <h1>🎨 Pixel ⇄ JSON Converter</h1>
  <p class="sub">Turn any image into a pixel JSON file, or rebuild a PNG from one.</p>

  <div class="section">
    <h2>1. Image → Pixel JSON</h2>
    <input type="file" id="imgInput" accept="image/*">
    <button id="convertBtn" disabled>Convert & Download JSON</button>
    <canvas id="previewCanvas"></canvas>
    <div class="status" id="imgStatus"></div>
  </div>

  <div class="section">
    <h2>2. Pixel JSON → PNG</h2>
    <input type="file" id="jsonInput" accept="application/json">
    <button id="rebuildBtn" disabled>Rebuild & Download PNG</button>
    <canvas id="rebuildCanvas"></canvas>
    <div class="status" id="jsonStatus"></div>
  </div>
</div>

<script>
const imgInput = document.getElementById('imgInput');
const convertBtn = document.getElementById('convertBtn');
const previewCanvas = document.getElementById('previewCanvas');
const imgStatus = document.getElementById('imgStatus');

const jsonInput = document.getElementById('jsonInput');
const rebuildBtn = document.getElementById('rebuildBtn');
const rebuildCanvas = document.getElementById('rebuildCanvas');
const jsonStatus = document.getElementById('jsonStatus');

let currentImageData = null;
let currentFileName = 'image';

imgInput.addEventListener('change', () => {
  const file = imgInput.files[0];
  if (!file) return;
  currentFileName = file.name.replace(/\.[^/.]+$/, '');
  const img = new Image();
  img.onload = () => {
    previewCanvas.width = img.width;
    previewCanvas.height = img.height;
    previewCanvas.style.display = 'block';
    const ctx = previewCanvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    currentImageData = ctx.getImageData(0, 0, img.width, img.height);
    imgStatus.textContent = `Loaded ${img.width}×${img.height} px image. Ready to convert.`;
    convertBtn.disabled = false;
  };
  img.src = URL.createObjectURL(file);
});

convertBtn.addEventListener('click', () => {
  if (!currentImageData) return;
  imgStatus.textContent = 'Building JSON...';
  const { width, height, data } = currentImageData;
  const pixels = [];
  for (let i = 0; i < data.length; i += 4) {
    pixels.push([data[i], data[i+1], data[i+2], data[i+3]]);
  }
  const payload = { width, height, pixels };
  const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${currentFileName}-pixels.json`;
  a.click();
  URL.revokeObjectURL(url);
  imgStatus.textContent = `Done! Downloaded ${width * height} pixels.`;
});

jsonInput.addEventListener('change', () => {
  const file = jsonInput.files[0];
  if (!file) return;
  jsonStatus.textContent = 'Reading JSON...';
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.width || !data.height || !Array.isArray(data.pixels)) {
        throw new Error('Invalid pixel JSON format');
      }
      window._rebuildData = data;
      jsonStatus.textContent = `Loaded ${data.width}×${data.height} px data. Ready to rebuild.`;
      rebuildBtn.disabled = false;
    } catch (err) {
      jsonStatus.textContent = 'Error: ' + err.message;
      rebuildBtn.disabled = true;
    }
  };
  reader.readAsText(file);
});

rebuildBtn.addEventListener('click', () => {
  const data = window._rebuildData;
  if (!data) return;
  jsonStatus.textContent = 'Rebuilding image...';
  const { width, height, pixels } = data;
  rebuildCanvas.width = width;
  rebuildCanvas.height = height;
  rebuildCanvas.style.display = 'block';
  const ctx = rebuildCanvas.getContext('2d');
  const imageData = ctx.createImageData(width, height);
  for (let i = 0; i < pixels.length; i++) {
    const [r, g, b, a] = pixels[i];
    imageData.data[i*4] = r;
    imageData.data[i*4+1] = g;
    imageData.data[i*4+2] = b;
    imageData.data[i*4+3] = a;
  }
  ctx.putImageData(imageData, 0, 0);
  rebuildCanvas.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'rebuilt-image.png';
    a.click();
    URL.revokeObjectURL(url);
    jsonStatus.textContent = 'Done! PNG downloaded.';
  }, 'image/png');
});
</script>
</body>
</html>
