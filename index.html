<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel ⇄ JSON Converter</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg1:#4f46e5;
    --bg2:#7c3aed;
    --card:rgba(255,255,255,.12);
    --border:rgba(255,255,255,.18);
    --text:#fff;
    --sub:#d7d7d7;
    --btn1:#06b6d4;
    --btn2:#2563eb;
    --success:#22c55e;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    font-family:Inter,"Segoe UI",sans-serif;
    background:
    radial-gradient(circle at top left,#8b5cf6,transparent 45%),
    radial-gradient(circle at bottom right,#06b6d4,transparent 45%),
    linear-gradient(135deg,#1e1b4b,#312e81,#0f172a);
    color:var(--text);
}

.card{
    width:100%;
    max-width:900px;
    backdrop-filter:blur(22px);
    background:var(--card);
    border:1px solid var(--border);
    border-radius:28px;
    padding:35px;
    box-shadow:
        0 25px 60px rgba(0,0,0,.35),
        inset 0 1px rgba(255,255,255,.15);
}

h1{
    text-align:center;
    font-size:34px;
    font-weight:700;
    margin-bottom:10px;
}

.sub{
    text-align:center;
    color:var(--sub);
    margin-bottom:35px;
    font-size:15px;
    line-height:1.6;
}

.section{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    border-radius:20px;
    padding:25px;
    margin-bottom:25px;
    transition:.35s;
}

.section:hover{
    transform:translateY(-5px);
    border-color:#60a5fa;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.section h2{
    margin-bottom:18px;
    font-size:20px;
    font-weight:600;
}

input[type=file]{
    width:100%;
    padding:14px;
    border-radius:14px;
    border:2px dashed rgba(255,255,255,.25);
    background:rgba(255,255,255,.05);
    color:#fff;
    cursor:pointer;
    margin-bottom:18px;
    transition:.3s;
}

input[type=file]:hover{
    border-color:#60a5fa;
    background:rgba(255,255,255,.09);
}

input[type=file]::file-selector-button{
    border:none;
    padding:10px 18px;
    border-radius:10px;
    background:linear-gradient(135deg,#8b5cf6,#2563eb);
    color:#fff;
    cursor:pointer;
    margin-right:15px;
    transition:.3s;
}

input[type=file]::file-selector-button:hover{
    transform:scale(1.05);
}

button{
    width:100%;
    border:none;
    border-radius:14px;
    padding:16px;
    font-size:16px;
    font-weight:600;
    color:#fff;
    cursor:pointer;
    background:linear-gradient(135deg,var(--btn1),var(--btn2));
    transition:.3s;
}

button:hover:not(:disabled){
    transform:translateY(-3px);
    box-shadow:0 15px 30px rgba(37,99,235,.35);
}

button:active{
    transform:scale(.98);
}

button:disabled{
    opacity:.4;
    cursor:not-allowed;
}

canvas{
    width:100%;
    max-height:420px;
    object-fit:contain;
    display:none;
    margin-top:20px;
    border-radius:18px;
    background:#fff;
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.status{
    margin-top:16px;
    padding:12px 16px;
    border-radius:12px;
    background:rgba(34,197,94,.15);
    color:#bbf7d0;
    font-size:14px;
    word-break:break-word;
    min-height:46px;
    display:flex;
    align-items:center;
}

.section:first-of-type{
    position:relative;
}

.section:first-of-type::before{
    content:"⬆ Upload Image";
    position:absolute;
    top:-12px;
    right:20px;
    background:#2563eb;
    color:#fff;
    font-size:12px;
    padding:6px 12px;
    border-radius:50px;
}

.section:last-of-type{
    position:relative;
}

.section:last-of-type::before{
    content:"⬇ Upload JSON";
    position:absolute;
    top:-12px;
    right:20px;
    background:#7c3aed;
    color:#fff;
    font-size:12px;
    padding:6px 12px;
    border-radius:50px;
}

@media(max-width:768px){

.card{
    padding:20px;
}

h1{
    font-size:26px;
}

.section{
    padding:18px;
}

.section h2{
    font-size:18px;
}

button{
    font-size:15px;
    padding:14px;
}

.status{
    font-size:13px;
}

}
</style>
</head>
<body>
<div class="card">
  <h1>🎨 Pixel ⇄ JSON Converter</h1>
  <p class="sub">Turn any image into a pixel JSON file, or rebuild a PNG from one.</p>

  <div class="section">
    <h2>1. Image → Pixel JSON</h2>
    <input type="file" id="imgInput" accept="image/*">
    <button id="convertBtn" disabled>Convert & Download JSON</button>
    <canvas id="previewCanvas"></canvas>
    <div class="status" id="imgStatus"></div>
  </div>

  <div class="section">
    <h2>2. Pixel JSON → PNG</h2>
    <input type="file" id="jsonInput" accept="application/json">
    <button id="rebuildBtn" disabled>Rebuild & Download PNG</button>
    <canvas id="rebuildCanvas"></canvas>
    <div class="status" id="jsonStatus"></div>
  </div>
</div>

<script>
const imgInput = document.getElementById('imgInput');
const convertBtn = document.getElementById('convertBtn');
const previewCanvas = document.getElementById('previewCanvas');
const imgStatus = document.getElementById('imgStatus');

const jsonInput = document.getElementById('jsonInput');
const rebuildBtn = document.getElementById('rebuildBtn');
const rebuildCanvas = document.getElementById('rebuildCanvas');
const jsonStatus = document.getElementById('jsonStatus');

let currentImageData = null;
let currentFileName = 'image';

imgInput.addEventListener('change', () => {
  const file = imgInput.files[0];
  if (!file) return;
  currentFileName = file.name.replace(/\.[^/.]+$/, '');
  const img = new Image();
  img.onload = () => {
    previewCanvas.width = img.width;
    previewCanvas.height = img.height;
    previewCanvas.style.display = 'block';
    const ctx = previewCanvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    currentImageData = ctx.getImageData(0, 0, img.width, img.height);
    imgStatus.textContent = `Loaded ${img.width}×${img.height} px image. Ready to convert.`;
    convertBtn.disabled = false;
  };
  img.src = URL.createObjectURL(file);
});

convertBtn.addEventListener('click', () => {
  if (!currentImageData) return;
  imgStatus.textContent = 'Building JSON...';
  const { width, height, data } = currentImageData;
  const pixels = [];
  for (let i = 0; i < data.length; i += 4) {
    pixels.push([data[i], data[i+1], data[i+2], data[i+3]]);
  }
  const payload = { width, height, pixels };
  const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${currentFileName}-pixels.json`;
  a.click();
  URL.revokeObjectURL(url);
  imgStatus.textContent = `Done! Downloaded ${width * height} pixels.`;
});

jsonInput.addEventListener('change', () => {
  const file = jsonInput.files[0];
  if (!file) return;
  jsonStatus.textContent = 'Reading JSON...';
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.width || !data.height || !Array.isArray(data.pixels)) {
        throw new Error('Invalid pixel JSON format');
      }
      window._rebuildData = data;
      jsonStatus.textContent = `Loaded ${data.width}×${data.height} px data. Ready to rebuild.`;
      rebuildBtn.disabled = false;
    } catch (err) {
      jsonStatus.textContent = 'Error: ' + err.message;
      rebuildBtn.disabled = true;
    }
  };
  reader.readAsText(file);
});

rebuildBtn.addEventListener('click', () => {
  const data = window._rebuildData;
  if (!data) return;
  jsonStatus.textContent = 'Rebuilding image...';
  const { width, height, pixels } = data;
  rebuildCanvas.width = width;
  rebuildCanvas.height = height;
  rebuildCanvas.style.display = 'block';
  const ctx = rebuildCanvas.getContext('2d');
  const imageData = ctx.createImageData(width, height);
  for (let i = 0; i < pixels.length; i++) {
    const [r, g, b, a] = pixels[i];
    imageData.data[i*4] = r;
    imageData.data[i*4+1] = g;
    imageData.data[i*4+2] = b;
    imageData.data[i*4+3] = a;
  }
  ctx.putImageData(imageData, 0, 0);
  rebuildCanvas.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'rebuilt-image.png';
    a.click();
    URL.revokeObjectURL(url);
    jsonStatus.textContent = 'Done! PNG downloaded.';
  }, 'image/png');
});
</script>
</body>
</html>
