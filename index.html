<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel ⇄ JSON Converter</title>
<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  min-height: 100dvh;
  overflow-x: hidden;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
  background-size: 400% 400%;
  animation: gradientShift 12s ease infinite;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  perspective: 1200px;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* floating blurred blobs */
body::before,
body::after {
  content: "";
  position: fixed;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.5;
  z-index: 0;
  pointer-events: none;
}

body::before {
  width: 280px;
  height: 280px;
  background: #f093fb;
  top: -60px;
  left: -60px;
  animation: floatBlob 8s ease-in-out infinite;
}

body::after {
  width: 320px;
  height: 320px;
  background: #4facfe;
  bottom: -80px;
  right: -60px;
  animation: floatBlob 10s ease-in-out infinite reverse;
}

@keyframes floatBlob {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(30px, 40px) scale(1.15); }
}

.card {
  position: relative;
  z-index: 1;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.4);
  border-radius: 24px;
  box-shadow:
    0 25px 60px rgba(31, 20, 90, 0.35),
    0 0 0 1px rgba(255,255,255,0.2) inset;
  padding: clamp(20px, 5vw, 40px);
  max-width: 720px;
  width: 100%;
  transform-style: preserve-3d;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  animation: cardEntrance 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes cardEntrance {
  from { opacity: 0; transform: translateY(40px) rotateX(8deg); }
  to { opacity: 1; transform: translateY(0) rotateX(0deg); }
}

.card:hover {
  transform: rotateX(2deg) rotateY(-2deg) translateY(-4px);
  box-shadow:
    0 35px 70px rgba(31, 20, 90, 0.4),
    0 0 0 1px rgba(255,255,255,0.3) inset;
}

h1 {
  margin: 0 0 6px;
  font-size: clamp(20px, 5vw, 28px);
  font-weight: 800;
  background: linear-gradient(90deg, #667eea, #f093fb, #4facfe);
  background-size: 200% auto;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: shineText 4s linear infinite;
}

@keyframes shineText {
  to { background-position: 200% center; }
}

p.sub {
  margin: 0 0 28px;
  color: #666;
  font-size: clamp(12px, 2.5vw, 14px);
}

.section {
  position: relative;
  background: rgba(255, 255, 255, 0.5);
  border: 2px dashed rgba(118, 75, 162, 0.3);
  border-radius: 16px;
  padding: clamp(14px, 3vw, 22px);
  margin-bottom: 20px;
  transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
}

.section:hover {
  transform: translateY(-3px) scale(1.01);
  border-color: #764ba2;
  box-shadow: 0 12px 30px rgba(102, 126, 234, 0.25);
}

.section h2 {
  margin: 0 0 12px;
  font-size: clamp(15px, 3vw, 17px);
  color: #333;
}

input[type="file"] {
  display: block;
  width: 100%;
  margin-bottom: 14px;
  font-size: 13px;
  padding: 8px;
  background: rgba(255,255,255,0.7);
  border-radius: 8px;
  border: 1px solid rgba(0,0,0,0.08);
}

button {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
  background-size: 200% auto;
  color: #fff;
  border: none;
  padding: 12px 22px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.3px;
  cursor: pointer;
  width: 100%;
  box-shadow: 0 8px 20px rgba(118, 75, 162, 0.35);
  transition: transform 0.2s ease, box-shadow 0.2s ease, background-position 0.4s ease;
}

button:hover:not(:disabled) {
  transform: translateY(-3px) scale(1.02);
  background-position: right center;
  box-shadow: 0 14px 30px rgba(118, 75, 162, 0.5);
}

button:active:not(:disabled) { transform: translateY(0) scale(0.98); }

button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  box-shadow: none;
  transform: none;
}

canvas {
  max-width: 100%;
  height: auto;
  border-radius: 12px;
  margin-top: 14px;
  border: 1px solid rgba(0,0,0,0.08);
  display: none;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.97); }
  to { opacity: 1; transform: scale(1); }
}

.status {
  font-size: 12px;
  font-weight: 500;
  color: #764ba2;
  margin-top: 10px;
  min-height: 18px;
  word-break: break-word;
}

@media (min-width: 480px) {
  button { width: auto; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation: none !important;
    transition: none !important;
  }
}
</style>
</head>
<body>
<div class="card">
  <h1>🎨 Pixel ⇄ JSON Converter</h1>
  <p class="sub">Turn any image into a pixel JSON file, or rebuild a PNG from one.</p>

  <div class="section">
    <h2>1. Image → Pixel JSON</h2>
    <input type="file" id="imgInput" accept="image/*">
    <button id="convertBtn" disabled>Convert & Download JSON</button>
    <canvas id="previewCanvas"></canvas>
    <div class="status" id="imgStatus"></div>
  </div>

  <div class="section">
    <h2>2. Pixel JSON → PNG</h2>
    <input type="file" id="jsonInput" accept="application/json">
    <button id="rebuildBtn" disabled>Rebuild & Download PNG</button>
    <canvas id="rebuildCanvas"></canvas>
    <div class="status" id="jsonStatus"></div>
  </div>
</div>

<script>
const imgInput = document.getElementById('imgInput');
const convertBtn = document.getElementById('convertBtn');
const previewCanvas = document.getElementById('previewCanvas');
const imgStatus = document.getElementById('imgStatus');

const jsonInput = document.getElementById('jsonInput');
const rebuildBtn = document.getElementById('rebuildBtn');
const rebuildCanvas = document.getElementById('rebuildCanvas');
const jsonStatus = document.getElementById('jsonStatus');

let currentImageData = null;
let currentFileName = 'image';

imgInput.addEventListener('change', () => {
  const file = imgInput.files[0];
  if (!file) return;
  currentFileName = file.name.replace(/\.[^/.]+$/, '');
  const img = new Image();
  img.onload = () => {
    previewCanvas.width = img.width;
    previewCanvas.height = img.height;
    previewCanvas.style.display = 'block';
    const ctx = previewCanvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    currentImageData = ctx.getImageData(0, 0, img.width, img.height);
    imgStatus.textContent = `Loaded ${img.width}×${img.height} px image. Ready to convert.`;
    convertBtn.disabled = false;
  };
  img.src = URL.createObjectURL(file);
});

convertBtn.addEventListener('click', () => {
  if (!currentImageData) return;
  imgStatus.textContent = 'Building JSON...';
  const { width, height, data } = currentImageData;
  const pixels = [];
  for (let i = 0; i < data.length; i += 4) {
    pixels.push([data[i], data[i+1], data[i+2], data[i+3]]);
  }
  const payload = { width, height, pixels };
  const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${currentFileName}-pixels.json`;
  a.click();
  URL.revokeObjectURL(url);
  imgStatus.textContent = `Done! Downloaded ${width * height} pixels.`;
});

jsonInput.addEventListener('change', () => {
  const file = jsonInput.files[0];
  if (!file) return;
  jsonStatus.textContent = 'Reading JSON...';
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.width || !data.height || !Array.isArray(data.pixels)) {
        throw new Error('Invalid pixel JSON format');
      }
      window._rebuildData = data;
      jsonStatus.textContent = `Loaded ${data.width}×${data.height} px data. Ready to rebuild.`;
      rebuildBtn.disabled = false;
    } catch (err) {
      jsonStatus.textContent = 'Error: ' + err.message;
      rebuildBtn.disabled = true;
    }
  };
  reader.readAsText(file);
});

rebuildBtn.addEventListener('click', () => {
  const data = window._rebuildData;
  if (!data) return;
  jsonStatus.textContent = 'Rebuilding image...';
  const { width, height, pixels } = data;
  rebuildCanvas.width = width;
  rebuildCanvas.height = height;
  rebuildCanvas.style.display = 'block';
  const ctx = rebuildCanvas.getContext('2d');
  const imageData = ctx.createImageData(width, height);
  for (let i = 0; i < pixels.length; i++) {
    const [r, g, b, a] = pixels[i];
    imageData.data[i*4] = r;
    imageData.data[i*4+1] = g;
    imageData.data[i*4+2] = b;
    imageData.data[i*4+3] = a;
  }
  ctx.putImageData(imageData, 0, 0);
  rebuildCanvas.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'rebuilt-image.png';
    a.click();
    URL.revokeObjectURL(url);
    jsonStatus.textContent = 'Done! PNG downloaded.';
  }, 'image/png');
});
</script>
</body>
</html>
